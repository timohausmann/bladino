#import "./fragments/weblink.graphql"

mutation AddComment($body: String, $channel: ID, $files: [ID!], $parent: ID) {
  addComment(body: $body, channel: $channel, files: $files, parent: $parent) {
    id
    body
    dateCreated
    files {
      id
      filename
      type
    }
  }
}

query Comment($id: ID!) {
  comment(id: $id) {
    id
    body
    dateCreated
    dateEdited
    parent
    user {
      id
      name
      avatar
    }
    files {
      id
      filename
      name
      type
      size
    }
    weblinks {
      ...WeblinkFields
    }
    children {
      id
      body
      dateCreated
      parent
      user {
        id
        name
        avatar
      }
      weblinks {
        ...WeblinkFields
      }
    }
  }
}
