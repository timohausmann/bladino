#import "./fragments/weblink.graphql"

query CommentFeed($filter: CommentFilter!, $cursor: Date) {
  commentFeed(filter: $filter, cursor: $cursor) {
    cursor
    comments {
      id
      body
      dateCreated
      dateEdited
      user {
        id
        name
        avatar
      }
      files {
        id
        filename
        name
        type
        size
      }
      weblinks {
        ...WeblinkFields
      }
    }
  }
}
