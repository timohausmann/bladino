#import "./fragments/weblink.graphql"
#import "./fragments/commentChild.graphql"

query CommentFeed($filter: CommentFilter!, $cursor: Date) {
  commentFeed(filter: $filter, cursor: $cursor) {
    cursor
    comments {
      id
      body
      dateCreated
      dateEdited
      user {
        id
        name
        avatar
      }
      files {
        id
        filename
        name
        type
        size
      }
      weblinks {
        ...WeblinkFields
      }
      children {
        ...CommentChildFields
      }
    }
  }
}
